<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переадресация — Goida VPN Site</title>

    <!-- SEO -->
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://avencores.github.io/goida-vpn-site/">
    <meta name="description" content="Переадресация на Goida VPN Site">

    <!-- Security: исправлен CSP — добавлены домены Google Fonts -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="no-referrer">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <!-- Preconnect для ускорения загрузки шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Шрифты через <link> вместо @import — быстрее -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap">

    <!-- Preload редирект-URL -->
    <link rel="preload" href="https://avencores.github.io/goida-vpn-site/" as="document">

    <!-- Meta Refresh как запасной вариант -->
    <meta http-equiv="refresh" content="3; url=https://avencores.github.io/goida-vpn-site/">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0c10;
            --surface: rgba(255,255,255,0.04);
            --surface-border: rgba(255,255,255,0.08);
            --accent: #00e5ff;
            --accent2: #7b61ff;
            --text: #e8eaf0;
            --muted: #5a6070;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            overflow: hidden;
        }

        /* Background mesh */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,229,255,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 70%, rgba(123,97,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Noise grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* Glassmorphism карточка */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 24px 64px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: fadein 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Spinner */
        .spinner-wrap {
            position: relative;
            width: 72px;
            height: 72px;
            animation: fadein 0.6s ease both;
        }

        .spinner {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.06);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        .spinner-inner {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.06);
            border-bottom-color: var(--accent2);
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Brand */
        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadein 0.6s 0.1s ease both;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: -1rem;
            animation: fadein 0.6s 0.15s ease both;
        }

        /* Counter — добавлен aria-live для скринридеров */
        .counter-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: fadein 0.6s 0.3s ease both;
        }

        .counter-label {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .counter-num {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            min-width: 1.5ch;
            text-align: center;
            transition: opacity 0.2s;
        }

        /* Progress bar */
        .progress-track {
            width: min(260px, 75vw);
            height: 2px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            overflow: hidden;
            animation: fadein 0.6s 0.35s ease both;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            /* Синхронизировано с реальным редиректом — 3 секунды */
            animation: progress 3s linear forwards;
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes progress { to { width: 100%; } }

        /* Fallback */
        .fallback {
            font-size: 0.8rem;
            color: var(--muted);
            animation: fadein 0.6s 0.5s ease both;
        }

        .fallback a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(0,229,255,0.3);
            transition: border-color 0.2s, color 0.2s;
        }

        .fallback a:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }

        @keyframes fadein {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- role="main" для доступности -->
        <main class="card" role="main">
            <div class="spinner-wrap" aria-hidden="true">
                <div class="spinner"></div>
                <div class="spinner-inner"></div>
            </div>

            <div class="brand">Goida VPN Site</div>
            <div class="subtitle">Переадресация</div>

            <div class="counter-row">
                <span class="counter-label">Через</span>
                <!-- aria-live="polite" — скринридер объявляет изменения счётчика -->
                <span class="counter-num" id="count" aria-live="polite" aria-label="секунд до переадресации">3</span>
                <span class="counter-label">сек.</span>
            </div>

            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="3" aria-valuenow="3" aria-label="Прогресс переадресации">
                <div class="progress-fill"></div>
            </div>

            <p class="fallback">
                Не перенаправляет? <a href="https://avencores.github.io/goida-vpn-site/" rel="noopener noreferrer">Нажмите здесь</a>
            </p>
        </main>
    </div>

    <script>
        const REDIRECT_URL = "https://avencores.github.io/goida-vpn-site/";
        const DELAY_MS = 3000;

        // Счётчик — обновляет aria-valuenow для доступности
        let n = DELAY_MS / 1000;
        const el = document.getElementById('count');
        const progressBar = document.querySelector('[role="progressbar"]');

        const interval = setInterval(() => {
            n--;
            el.style.opacity = '0';
            setTimeout(() => {
                el.textContent = n;
                el.style.opacity = '1';
                if (progressBar) progressBar.setAttribute('aria-valuenow', n);
            }, 150);
            if (n <= 0) clearInterval(interval);
        }, 1000);

        // Редирект через setTimeout — теперь синхронизирован с отсчётом
        setTimeout(() => {
            window.location.replace(REDIRECT_URL);
        }, DELAY_MS);
    </script>
</body>
</html>
