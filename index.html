<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переадресация — Goida VPN Site</title>

    <!-- SEO -->
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://avencores.github.io/goida-vpn-site/">
    <meta name="description" content="Переадресация на Goida VPN Site">

    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="no-referrer">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <!-- Redirect: Meta Refresh -->
    <meta http-equiv="refresh" content="3; url=https://avencores.github.io/goida-vpn-site/">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --accent: #00e5ff;
            --accent2: #7b61ff;
            --text: #e8eaf0;
            --muted: #5a6070;
            --border: rgba(255,255,255,0.07);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            overflow: hidden;
        }

        /* Background mesh */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,229,255,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 70%, rgba(123,97,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Noise grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
        }

        /* Spinner */
        .spinner-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            animation: fadein 0.6s ease both;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        .spinner-inner {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 2px solid var(--border);
            border-bottom-color: var(--accent2);
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Logo / Brand */
        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadein 0.6s 0.1s ease both;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            animation: fadein 0.6s 0.2s ease both;
        }

        /* Counter */
        .counter-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            animation: fadein 0.6s 0.3s ease both;
        }

        .counter-label {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .counter-num {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            min-width: 1.5ch;
            text-align: center;
            transition: opacity 0.2s;
        }

        /* Progress bar */
        .progress-track {
            width: min(320px, 80vw);
            height: 2px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            animation: fadein 0.6s 0.35s ease both;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            animation: progress 3s linear forwards;
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes progress { to { width: 100%; } }

        /* Fallback link */
        .fallback {
            font-size: 0.82rem;
            color: var(--muted);
            animation: fadein 0.6s 0.5s ease both;
        }

        .fallback a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(0,229,255,0.3);
            transition: border-color 0.2s, color 0.2s;
        }

        .fallback a:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }

        @keyframes fadein {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner-wrap">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
        </div>

        <div class="brand">Goida VPN Site</div>
        <div class="subtitle">Переадресация</div>

        <div class="counter-row">
            <span class="counter-label">Через</span>
            <span class="counter-num" id="count">3</span>
            <span class="counter-label">сек.</span>
        </div>

        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>

        <p class="fallback">
            Не перенаправляет? <a href="https://avencores.github.io/goida-vpn-site/" rel="noopener noreferrer">Нажмите здесь</a>
        </p>
    </div>

    <script>
        // Countdown
        let n = 3;
        const el = document.getElementById('count');
        const interval = setInterval(() => {
            n--;
            el.style.opacity = '0';
            setTimeout(() => { el.textContent = n; el.style.opacity = '1'; }, 150);
            if (n <= 0) clearInterval(interval);
        }, 1000);

        // Redirect
        window.location.replace("https://avencores.github.io/goida-vpn-site/");
    </script>
</body>
</html>
